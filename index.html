<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Someday Lease</title>
  <meta name="description" content="A someday list where every item is on a lease. When it expires: renew it, act on it, or let it go.">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">Someday<span class="app-title-accent">Lease</span></h1>
        <div class="backup-controls">
          <span class="backup-age" id="backupAge"></span>
          <button class="btn" id="exportBtn">Export</button>
          <button class="btn" id="importBtn">Import</button>
        </div>
      </div>
      <p class="carrying-line" id="carryingLine" hidden></p>
    </header>

    <nav class="tabs" id="tabs" role="tablist" aria-label="Views">
      <button class="tab" role="tab" aria-selected="true" data-view="active">Somedays<span class="tab-badge" id="dueBadge" hidden></span></button>
      <button class="tab" role="tab" aria-selected="false" data-view="acted">Did it</button>
      <button class="tab" role="tab" aria-selected="false" data-view="released">Released</button>
    </nav>

    <div class="filter-row" id="filterRow" hidden></div>

    <main id="content"></main>
  </div>

  <input type="file" id="importFile" accept=".json,application/json" hidden>

  <button class="btn primary add-fab" id="addBtn">Add a someday</button>

  <div class="backdrop" id="backdrop" hidden></div>

  <aside class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle" hidden>
    <div class="panel-head">
      <h2 class="panel-title" id="panelTitle"></h2>
      <button class="panel-close" id="panelClose" aria-label="Close">&times;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </aside>

  <div class="modal-wrap" id="modalWrap" hidden>
    <div class="modal card" id="modalCard" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <datalist id="categoryOptions"></datalist>

  <script type="module" src="app.js"></script>
</body>
</html>
